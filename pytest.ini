[pytest]
addopts =
    --import-mode=prepend
pythonpath =
    .
testpaths =
    tests
norecursedirs =
    .venv
    .git
    .idea
    __pycache__
    build
    dist
    examples
markers =
    slow: long-running tests
    cuda: requires CUDA/CuPy and GPU extensions
    p1_quarantine: known failing coverage tracked for P1 follow-up and excluded from P0 blocking lanes
